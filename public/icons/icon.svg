<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Pure black background - safe for all devices -->
  <rect width="1024" height="1024" fill="#000000"/>
  
  <!-- Three thick, bold, centered arcs - visible even at 48px -->
  <!-- All within Android safe zone (66% centered = 170px margin each side) -->
  
  <!-- Outer arc -->
  <path d="M290 430 Q512 660 734 430" 
        stroke="#FFFFFF" stroke-width="48" fill="none" stroke-linecap="round"/>
  
  <!-- Middle arc -->
  <path d="M330 340 Q512 540 694 340" 
        stroke="#FFFFFF" stroke-width="44" fill="none" stroke-linecap="round"/>
  
  <!-- Inner arc -->
  <path d="M370 260 Q512 430 654 260" 
        stroke="#FFFFFF" stroke-width="40" fill="none" stroke-linecap="round"/>
  
  <!-- No text inside icon - text is unreadable at 48px app icon size -->
</svg>