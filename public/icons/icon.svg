<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background with glow -->
  <rect width="512" height="512" rx="100" fill="url(#bg)" filter="url(#glow)"/>
  
  <!-- N Letter -->
  <text x="256" y="320" font-family="system-ui, -apple-system, sans-serif" 
        font-size="280" font-weight="800" fill="white" text-anchor="middle"
        letter-spacing="-10">N</text>
  
  <!-- Subtle accent line -->
  <path d="M140 380 Q256 360 372 380" stroke="rgba(255,255,255,0.3)" 
        stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>