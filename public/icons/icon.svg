<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F5F5"/>
      <stop offset="100%" stop-color="#E8E8E8"/>
    </linearGradient>
    <!-- Squircle clip path -->
    <clipPath id="squircle">
      <rect x="0" y="0" width="1024" height="1024" rx="200"/>
    </clipPath>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)" rx="80"/>
  
  <!-- Drop shadow (bottom-right) -->
  <rect x="20" y="20" width="984" height="984" rx="200" fill="#00000040" filter="url(#shadow)"/>
  <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="15"/>
    <feOffset dx="5" dy="8"/>
    <feComponentTransfer>
      <feFuncA type="linear" slope="0.3"/>
    </feComponentTransfer>
    <feMerge>
      <feMergeNode/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  
  <!-- Main dark squircle (centered, 720px) -->
  <rect x="152" y="40" width="720" height="720" rx="160" fill="#0f0f0f"/>
  
  <!-- Inner glossy border -->
  <rect x="152" y="40" width="720" height="720" rx="160" fill="none" stroke="#333333" stroke-width="2" opacity="0.5"/>
  
  <!-- Three signal arcs (upper-right quadrant) -->
  <!-- Innermost arc -->
  <path d="M580 130 Q650 130 700 180" 
        stroke="#FFFFFF" stroke-width="22" fill="none" stroke-linecap="round" opacity="0.9"/>
  <!-- Middle arc -->
  <path d="M540 190 Q650 190 730 270" 
        stroke="#FFFFFF" stroke-width="24" fill="none" stroke-linecap="round" opacity="0.95"/>
  <!-- Outer arc -->
  <path d="M500 260 Q650 260 755 380" 
        stroke="#FFFFFF" stroke-width="26" fill="none" stroke-linecap="round"/>
  
  <!-- Inner "Nura" text -->
  <text x="512" y="580" font-family="'SF Pro', 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="48" font-weight="300" fill="#CCCCCC" text-anchor="middle" letter-spacing="4">Nura</text>
  
  <!-- Outer "NURA" brand text -->
  <text x="512" y="860" font-family="'SF Pro', 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="64" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="12">NURA</text>
</svg>