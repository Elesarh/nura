<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  
  <!-- Subtle background shadow crescent -->
  <path d="M120 500 Q512 780 904 500 Q512 740 120 500Z" fill="#1a1a1a" opacity="0.2"/>
  
  <!-- Three nested white crescents with proper safe area -->
  <!-- All crescents are centered, have 100px+ safe margin from edges -->
  
  <!-- Largest crescent (bottom) -->
  <path d="M262 590 Q512 740 762 590 Q512 640 262 590Z" fill="#FFFFFF"/>
  
  <!-- Middle crescent -->
  <path d="M332 510 Q512 630 692 510 Q512 555 332 510Z" fill="#FFFFFF"/>
  
  <!-- Smallest crescent (top) -->
  <path d="M402 430 Q512 525 622 430 Q512 480 402 430Z" fill="#FFFFFF"/>
  
  <!-- Text -->
  <text x="512" y="820" font-family="Montserrat, 'Segoe UI', Helvetica, sans-serif" 
        font-size="64" font-weight="300" fill="#FFFFFF" 
        text-anchor="middle" letter-spacing="15">Nura</text>
</svg>