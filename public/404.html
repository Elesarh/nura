<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>NURA</title>
  <script>
    // Save the full current path before redirect
    // The SPA will read this and redirect to the correct route
    sessionStorage.setItem('nura_redirect', location.pathname.replace('/nura', '') + location.search);
    // Then go to the SPA root
    location.replace('/nura/');
  </script>
</head>
<body>
  <p>در حال انتقال...</p>
</body>
</html>
