<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - NURA</title>
    <meta name="theme-color" content="#000000">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: system-ui, -apple-system, sans-serif;
            text-align: center;
        }
        .icon {
            width: 120px;
            height: 120px;
            margin-bottom: 24px;
            opacity: 0.9;
        }
        h1 {
            margin: 0 0 12px 0;
            font-size: 28px;
            font-weight: 800;
        }
        p {
            margin: 0 0 32px 0;
            color: #94a3b8;
            font-size: 16px;
        }
        button {
            padding: 12px 24px;
            background-color: #333333;
            color: white;
            border: 1px solid #444444;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover {
            background-color: #444444;
        }
    </style>
</head>
<body>
    <img src="/icons/icon-192.png" class="icon" alt="NURA Logo" />
    <h1>You are offline</h1>
    <p>Connection lost. Please reconnect.</p>
    <button onclick="window.location.reload()">Try Again</button>
</body>
</html>
