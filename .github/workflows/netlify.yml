name: Deploy NURA to Netlify

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --legacy-peer-deps --ignore-scripts

      - name: Build
        run: npm run build

      - name: Copy PWA and static files to dist
        run: |
          cp public/_redirects dist/
          cp -r public/icons dist/ 2>/dev/null || true
          cp public/manifest.json dist/
          cp public/service-worker.js dist/

      - name: Deploy to Netlify
        run: |
          # Deploy using Netlify's REST API directly
          ZIP_FILE="/tmp/nura-deploy.zip"
          cd dist
          # Create a zip of the dist folder
          zip -r $ZIP_FILE . -q
          # Get upload URL from Netlify API
          UPLOAD_URL=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.NETLIFY_AUTH_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://api.netlify.com/api/v1/sites/${{ secrets.NETLIFY_SITE_ID }}/deploys" | \
            python3 -c "import sys,json; print(json.load(sys.stdin).get('required', [{}])[0].get('upload_url',''))" 2>/dev/null || echo "")
          if [ -z "$UPLOAD_URL" ]; then
            # Fallback: direct deploy
            curl -s -X POST \
              -H "Authorization: Bearer ${{ secrets.NETLIFY_AUTH_TOKEN }}" \
              -H "Content-Type: application/zip" \
              --data-binary @$ZIP_FILE \
              "https://api.netlify.com/api/v1/sites/${{ secrets.NETLIFY_SITE_ID }}/deploys"
          else
            curl -s -X PUT \
              -H "Content-Type: application/zip" \
              --data-binary @$ZIP_FILE \
              "$UPLOAD_URL"
          fi
          echo "Deploy complete"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}