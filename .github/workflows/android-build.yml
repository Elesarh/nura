name: Build NURA Android APK

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install npm deps
        run: npm install --legacy-peer-deps --ignore-scripts
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Build web app
        run: npm run build

      - name: Copy static assets
        run: |
          cp -r public/icons dist/ 2>/dev/null || true
          cp public/manifest.json dist/
          cp public/service-worker.js dist/
          cp capacitor.config.json dist/

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/android --legacy-peer-deps

      - name: Add Android
        run: npx cap add android

      - name: Copy web to Android
        run: npx cap copy android

      - name: Copy custom app icons to Android
        run: python3 scripts/copy-android-icons.py

      - name: Prepare Gradle fixes
        run: python3 scripts/fix-android-build.py

      - name: Set app version
        run: |
          cd android
          VERSION_TAG="${GITHUB_REF_NAME#v}"
          MAJOR=$(echo "$VERSION_TAG" | cut -d. -f1)
          MINOR=$(echo "$VERSION_TAG" | cut -d. -f2)
          PATCH=$(echo "$VERSION_TAG" | cut -d. -f3)
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH + 100000))
          sed -i 's/versionName "[^"]*"/versionName "'$VERSION_TAG'"/' app/build.gradle
          sed -i 's/versionCode [0-9]*/versionCode '$VERSION_CODE'/' app/build.gradle
          echo "Version: $VERSION_TAG, Code: $VERSION_CODE"

      - name: Build Debug APK
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug -x lint --no-daemon

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: NURA-APK
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload APK to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/*.apk
          name: NURA ${{ github.ref_name }}
          body: 🚀 NURA نسخه ${{ github.ref_name }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}