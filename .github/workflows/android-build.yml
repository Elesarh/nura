name: Build NURA Android APK

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install npm deps
        run: npm install --legacy-peer-deps --ignore-scripts
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Build web app
        run: npm run build

      - name: Copy static assets
        run: |
          cp -r public/icons dist/ 2>/dev/null || true
          cp public/manifest.json dist/
          cp public/service-worker.js dist/

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/android --legacy-peer-deps

      - name: Init Capacitor
        run: npx cap init NURA com.nura.app --web-dir dist

      - name: Add Android
        run: npx cap add android

      - name: Copy web to Android
        run: npx cap copy android

      - name: Fix Kotlin duplicates
        run: |
          cd android
          GRADLE_FILE="app/build.gradle"
          sed -i '/kotlin-stdlib-jdk/d' "$GRADLE_FILE" 2>/dev/null || true
          echo '' >> "$GRADLE_FILE"
          echo "configurations.all {" >> "$GRADLE_FILE"
          echo "    resolutionStrategy {" >> "$GRADLE_FILE"
          echo "        force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.22'" >> "$GRADLE_FILE"
          echo "        force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.22'" >> "$GRADLE_FILE"
          echo "        force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.22'" >> "$GRADLE_FILE"
          echo "    }" >> "$GRADLE_FILE"
          echo "}" >> "$GRADLE_FILE"

      - name: Get version from tag or default
        id: version
        run: |
          VERSION="v0.1.0"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build Debug APK
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug -x lint --no-daemon

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: NURA-v0.1.0
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload APK to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/*.apk
          tag_name: ${{ steps.version.outputs.version }}
          name: NURA ${{ steps.version.outputs.version }}
          body: |
            🚀 NURA نسخه ${{ steps.version.outputs.version }}
            
            - افزودن دکمه چشم برای نمایش/مخفی کردن رمز عبور
            - سیستم بررسی آپدیت خودکار
            - بهبود تجربه کاربری
          draft: false
          prerelease: false