name: Build NURA Android APK

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install npm deps
        run: npm install --legacy-peer-deps --ignore-scripts
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Build web app
        run: npm run build

      - name: Copy static assets
        run: |
          cp -r public/icons dist/ 2>/dev/null || true
          cp public/manifest.json dist/
          cp public/service-worker.js dist/

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/android --legacy-peer-deps

      - name: Init Capacitor
        run: npx cap init NURA com.nura.app --web-dir dist --yes

      - name: Add Android
        run: npx cap add android

      - name: Copy web to Android
        run: npx cap copy android

      - name: Build Debug APK
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: NURA-Debug-APK
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 14