name: Build NURA Android APK

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install npm deps
        run: npm install --legacy-peer-deps --ignore-scripts
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Build web app
        run: npm run build

      - name: Copy static assets
        run: |
          cp -r public/icons dist/ 2>/dev/null || true
          cp public/manifest.json dist/
          cp public/service-worker.js dist/
          cp capacitor.config.json dist/

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/android --legacy-peer-deps

      - name: Add Android
        run: npx cap add android

      - name: Copy web to Android
        run: npx cap copy android

      - name: Fix Kotlin duplicates + signing
        run: |
          cd android
          GRADLE_FILE="app/build.gradle"
          sed -i '/kotlin-stdlib-jdk/d' "$GRADLE_FILE" 2>/dev/null || true
          echo '' >> "$GRADLE_FILE"
          echo "configurations.all {" >> "$GRADLE_FILE"
          echo "    resolutionStrategy {" >> "$GRADLE_FILE"
          echo "        force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.22'" >> "$GRADLE_FILE"
          echo "        force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.22'" >> "$GRADLE_FILE"
          echo "        force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.22'" >> "$GRADLE_FILE"
          echo "    }" >> "$GRADLE_FILE"
          echo "}" >> "$GRADLE_FILE"
          # Add signing config to app/build.gradle
          echo '' >> "$GRADLE_FILE"
          echo "android.signingConfigs {" >> "$GRADLE_FILE"
          echo "    debug {" >> "$GRADLE_FILE"
          echo "        storeFile file('../../keystore/nura-debug.keystore')" >> "$GRADLE_FILE"
          echo "        storePassword 'nura123'" >> "$GRADLE_FILE"
          echo "        keyAlias 'nura'" >> "$GRADLE_FILE"
          echo "        keyPassword 'nura123'" >> "$GRADLE_FILE"
          echo "    }" >> "$GRADLE_FILE"
          echo "}" >> "$GRADLE_FILE"

      - name: Set app version in Android
        run: |
          cd android
          VERSION_TAG="${GITHUB_REF_NAME#v}"
          MAJOR=$(echo "$VERSION_TAG" | cut -d. -f1)
          MINOR=$(echo "$VERSION_TAG" | cut -d. -f2)
          PATCH=$(echo "$VERSION_TAG" | cut -d. -f3)
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH + 100000))
          sed -i "s/versionName \"[^\"]*\"/versionName \"$VERSION_TAG\"/" app/build.gradle
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" app/build.gradle
          echo "Version: $VERSION_TAG, Code: $VERSION_CODE"

      - name: Fix signing config in build.gradle
        run: |
          cd android
          GRADLE_FILE="app/build.gradle"
          # Remove any previous signing config we added
          sed -i '/nura-debug.keystore/d' "$GRADLE_FILE" 2>/dev/null || true
          sed -i '/nura123/d' "$GRADLE_FILE" 2>/dev/null || true
          # Add signing config INSIDE the android block (before closing })
          sed -i '/^android {/a\    signingConfigs {\n        debug {\n            storeFile file("../../keystore/nura-debug.keystore")\n            storePassword "nura123"\n            keyAlias "nura"\n            keyPassword "nura123"\n        }\n    }' "$GRADLE_FILE" 2>/dev/null || true

      - name: Build Debug APK
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug -x lint --no-daemon

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: NURA-APK
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload APK to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/*.apk
          name: NURA ${{ github.ref_name }}
          body: 🚀 NURA نسخه ${{ github.ref_name }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}