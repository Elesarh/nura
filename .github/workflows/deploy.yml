name: Build & Deploy NURA PWA

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps --ignore-scripts

      - name: Build
        run: npm run build

      - name: Copy PWA and SPA files to dist
        run: |
          cp -r public/icons dist/ 2>/dev/null || true
          cp public/manifest.json dist/
          cp public/service-worker.js dist/
          cp public/offline.html dist/ 2>/dev/null || true
          cp public/offline-image.png dist/ 2>/dev/null || true
          # Copy 404.html for SPA routing on GitHub Pages
          cp public/404.html dist/ 2>/dev/null || true

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4