<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#4F46E5" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NURA" />
    <meta name="application-name" content="NURA" />
    <meta name="msapplication-TileColor" content="#4F46E5" />
    <meta name="msapplication-TileImage" content="/nura/icons/icon-144.png" />
    <meta property="og:title" content="NURA — حسابداری هوشمند فروشگاهی" />
    <meta property="og:description" content="سیستم حسابداری هوشمند با دستیار هوش مصنوعی" />
    <meta property="og:type" content="website" />

    <link rel="manifest" href="/nura/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/nura/icons/icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/nura/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/nura/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/nura/icons/icon-152.png" />

    <title>NURA — حسابداری هوشمند</title>
    <style>
      /* Splash screen */
      #splash {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: linear-gradient(135deg, #4F46E5, #7C3AED);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition: opacity 0.5s ease;
      }
      #splash.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #splash .logo {
        width: 80px; height: 80px;
        background: rgba(255,255,255,0.2);
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 48px;
        font-weight: bold;
        color: white;
        font-family: sans-serif;
        margin-bottom: 16px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      #splash .title {
        color: white; font-family: sans-serif;
        font-size: 20px; font-weight: 600; opacity: 0.9;
      }
      #splash .subtitle {
        color: rgba(255,255,255,0.6);
        font-family: sans-serif; font-size: 13px; margin-top: 4px;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      /* Error display */
      #app-error {
        display: none;
        padding: 20px;
        font-family: sans-serif;
        text-align: center;
        margin-top: 40px;
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="logo">N</div>
      <div class="title">NURA</div>
      <div class="subtitle">حسابداری هوشمند فروشگاهی</div>
    </div>
    <div id="root"></div>
    <div id="app-error"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Hide splash after timeout - works even if React crashes
      setTimeout(function() {
        var s = document.getElementById('splash');
        if (s) s.classList.add('hidden');
      }, 5000);

      window.addEventListener('load', function() {
        setTimeout(function() {
          document.getElementById('splash')?.classList.add('hidden');
        }, 800);
      });

      // Global error handler - show error on screen
      window.addEventListener('error', function(e) {
        document.getElementById('splash')?.classList.add('hidden');
        var errDiv = document.getElementById('app-error');
        if (errDiv) {
          errDiv.style.display = 'block';
          errDiv.innerHTML = '<h3>خطا در بارگذاری برنامه</h3><p>' + (e.message || 'خطای ناشناخته') + '</p><button onclick="location.reload()">تلاش مجدد</button>';
        }
      });

      // Service Worker
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/nura/service-worker.js", { scope: "/nura/" });
      }
    </script>
  </body>
</html>
