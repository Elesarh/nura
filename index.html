<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#4F46E5" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NURA" />
    <meta name="application-name" content="NURA" />
    <meta name="msapplication-TileColor" content="#4F46E5" />
    <meta name="msapplication-TileImage" content="/icons/icon-144.png" />
    <meta property="og:title" content="NURA — حسابداری هوشمند فروشگاهی" />
    <meta property="og:description" content="سیستم حسابداری هوشمند با دستیار هوش مصنوعی" />
    <meta property="og:type" content="website" />

    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />

    <title>NURA — حسابداری هوشمند</title>
    <style>
      #splash {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: linear-gradient(135deg, #4F46E5, #7C3AED);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition: opacity 0.5s ease;
      }
      #splash.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #splash .logo {
        width: 80px; height: 80px;
        background: rgba(255,255,255,0.2);
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 48px;
        font-weight: bold;
        color: white;
        font-family: sans-serif;
        margin-bottom: 16px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      #splash .title {
        color: white; font-family: sans-serif;
        font-size: 20px; font-weight: 600; opacity: 0.9;
      }
      #splash .subtitle {
        color: rgba(255,255,255,0.6);
        font-family: sans-serif; font-size: 13px; margin-top: 4px;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="logo">N</div>
      <div class="title">NURA</div>
      <div class="subtitle">حسابداری هوشمند فروشگاهی</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      setTimeout(function() {
        document.getElementById('splash')?.classList.add('hidden');
      }, 5000);
      window.addEventListener('load', function() {
        setTimeout(function() {
          document.getElementById('splash')?.classList.add('hidden');
        }, 800);
      });
      window.addEventListener('error', function(e) {
        document.getElementById('splash')?.classList.add('hidden');
        var errDiv = document.getElementById('app-error') || (function() {
          var d = document.createElement('div');
          d.id = 'app-error';
          d.style.cssText = 'padding:20px;font-family:sans-serif;text-align:center;margin-top:40px;color:#333';
          document.body.appendChild(d);
          return d;
        })();
        errDiv.innerHTML = '<h2>⚠️ خطا</h2><p style="color:red">' + (e.message || 'خطای ناشناخته') + '</p><button onclick="location.reload()" style="padding:10px 20px;margin-top:10px;border:none;border-radius:8px;background:#4F46E5;color:white;cursor:pointer">تلاش مجدد</button>';
      });
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/service-worker.js").then(reg => {
          console.log("[PWA] SW registered:", reg.scope);
        }).catch(err => {
          console.error("[PWA] SW failed:", err);
        });
      }
    </script>
  </body>
</html>
